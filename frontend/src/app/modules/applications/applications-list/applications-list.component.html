<div class="header">
  <div>
    <h1>Applications</h1>
    <p>Manage licensing applications by workflow state.</p>
  </div>

  <button
    mat-raised-button
    color="primary"
    routerLink="/applications/new"
    *ngIf="auth.hasPermission('CREATE_APPLICATION')"
  >
    New Application
  </button>
</div>

<mat-card class="filters-card">
  <button mat-button (click)="setView('ALL')">
    All
  </button>

  <button mat-button (click)="setView('REVIEW')">
    Review Queue
  </button>

  <button mat-button (click)="setView('APPROVAL')">
    Approval Queue
  </button>
</mat-card>

<mat-card *ngIf="loading">
  Loading applications...
</mat-card>

<mat-card *ngIf="error">
  <p class="error-text">{{ error }}</p>
  <button mat-button color="primary" (click)="loadApplications()">
    Retry
  </button>
</mat-card>

<mat-card *ngIf="!loading && !error && filteredApplications.length === 0">
  No applications found.
</mat-card>

<mat-card *ngIf="!loading && !error && filteredApplications.length > 0">
  <table
    mat-table
    [dataSource]="filteredApplications"
    class="full-width"
  >
    <ng-container matColumnDef="referenceNumber">
      <th mat-header-cell *matHeaderCellDef>Reference</th>
      <td mat-cell *matCellDef="let app">
        {{ app.referenceNumber }}
      </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Institution</th>
      <td mat-cell *matCellDef="let app">
        {{ app.name }}
      </td>
    </ng-container>

    <ng-container matColumnDef="licenseType">
      <th mat-header-cell *matHeaderCellDef>License Type</th>
      <td mat-cell *matCellDef="let app">
        {{ app.licenseType }}
      </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let app">
        <mat-chip>
          {{ app.status }}
        </mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let app">
        <button
          mat-button
          color="primary"
          [routerLink]="['/applications', app.id]"
        >
          View
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</mat-card>
