<ng-container *ngFor="let item of menuItems">

  <a
    mat-list-item
    *ngIf="hasMenuPermission(item.permission)"
    [routerLink]="item.route"
  >

    <mat-icon matListItemIcon>
      {{ item.icon }}
    </mat-icon>

    <span matListItemTitle>
      {{ item.label }}
    </span>

  </a>

</ng-container>
